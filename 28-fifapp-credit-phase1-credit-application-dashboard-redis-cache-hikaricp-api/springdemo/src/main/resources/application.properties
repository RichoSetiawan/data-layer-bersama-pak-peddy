spring.application.name=springdemo

spring.datasource.url=jdbc:postgresql://localhost:5432/fifapp?currentSchema=flyway_training
#spring.jpa.properties.hibernate.default_schema=fifapp_credit_new
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.schema=flyway_training

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.default_schema=flyway_training
#spring.flyway.repair-on-migrate=true

spring.data.rest.default-media-type=application/json

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s

app.redis.dashboard-cache-prefix=dashboard:branch
app.redis.dashboard-cache-ttl=60s

spring.datasource.hikari.pool-name=FIFPedyHikariPool
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.validation-timeout=1000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

